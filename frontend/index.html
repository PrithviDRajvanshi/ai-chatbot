<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI Chatbot — A real-time conversational AI powered by OpenRouter. Ask anything and get intelligent responses." />
  <title>AI Chatbot — Intelligent Conversations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Ambient Background Glow ─────────────────────────── -->
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>
  <div class="bg-glow bg-glow--3"></div>

  <!-- ── Main Chat Container ─────────────────────────────── -->
  <div class="chat-wrapper" id="chatWrapper">

    <!-- Header -->
    <header class="chat-header" id="chatHeader">
      <div class="chat-header__logo">
        <div class="chat-header__icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="url(#iconGrad)"/>
            <defs>
              <linearGradient id="iconGrad" x1="2" y1="2" x2="22" y2="22">
                <stop stop-color="#a78bfa"/>
                <stop offset="1" stop-color="#60a5fa"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="chat-header__text">
          <h1>AI Chatbot</h1>
          <span class="chat-header__status" id="headerStatus">
            <span class="status-dot"></span>
            Online
          </span>
        </div>
      </div>
      <button class="chat-header__clear" id="clearBtn" title="New conversation">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"></polyline>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
        </svg>
      </button>
    </header>

    <!-- Chat Messages Area -->
    <main class="chat-messages" id="chatMessages">
      <!-- Welcome Message -->
      <div class="welcome-card" id="welcomeCard">
        <div class="welcome-card__icon">🤖</div>
        <h2>Welcome!</h2>
        <p>I'm your AI assistant. Ask me anything — I'll remember our entire conversation.</p>
        <div class="welcome-card__suggestions">
          <button class="suggestion-chip" data-message="What is JavaScript?">What is JavaScript?</button>
          <button class="suggestion-chip" data-message="Explain REST APIs in simple terms">Explain REST APIs</button>
          <button class="suggestion-chip" data-message="Write a short poem about coding">Write a poem</button>
        </div>
      </div>
    </main>

    <!-- Input Area -->
    <footer class="chat-input-area" id="chatInputArea">
      <div class="chat-input-container">
        <textarea
          id="messageInput"
          class="chat-input"
          placeholder="Type your message..."
          rows="1"
          autocomplete="off"
          aria-label="Type your message"
        ></textarea>
        <button class="send-btn" id="sendBtn" title="Send message" aria-label="Send message">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <p class="chat-disclaimer">AI can make mistakes. Verify important information.</p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
